<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Proposal ❤️</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#ffd6e7;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
font-size:38px;
color:#ff2e63;
}

img{
width:220px;
margin-bottom:20px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

#yes{
background:#ff2e63;
color:white;
}

#no{
background:#333;
color:white;
}

</style>

</head>

<body>

<img id="bear" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

<h1 id="question">Will you be my Baby, Darinling and Lover? ❤️</h1>

<button id="yes">Yes</button>
<button id="no">No</button>

<script>

let noCount = 0;
let yesSize = 20;

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const bear = document.getElementById("bear");
const question = document.getElementById("question");

noBtn.addEventListener("click", () => {

noCount++;

yesSize += 10;
yesBtn.style.fontSize = yesSize + "px";
yesBtn.style.padding = (15 + noCount*5) + "px " + (30 + noCount*10) + "px";

bear.src="https://media.giphy.com/media/ROF8OQvDmxytW/giphy.gif"; // sad bear

if(noCount == 1){
question.innerText="No 😢";
}

else if(noCount == 2){
question.innerText="Are you sure? 😭";
}

else if(noCount == 3){
question.innerText="I will really be sad...";
}

else if(noCount == 4){
question.innerText="I will be VERY sad 💔";

noBtn.addEventListener("mouseover", runAway);

}

});

function runAway(){

const x = Math.random()*window.innerWidth;
const y = Math.random()*window.innerHeight;

noBtn.style.position="absolute";
noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

}

yesBtn.addEventListener("click", () => {

bear.src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"; // happy bear

question.innerText="YAYYYY ❤️ I knew you would say YES!!";

yesBtn.style.display="none";
noBtn.style.display="none";

});

</script>

</body>
</html>
